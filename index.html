<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GIS Web Template v3</title>

<link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="config.js"></script>

<style>
body { margin: 0; font-family: sans-serif; }

#sidebar {
  position: absolute;
  left: 0;
  top: 0;
  width: 300px;
  height: 100vh;
  background: #fff;
  border-right: 1px solid #ddd;
  padding: 12px;
  overflow-y: auto;
}

#map {
  position: absolute;
  left: 300px;
  right: 0;
  top: 0;
  bottom: 0;
}

.block {
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}

h4 { margin: 10px 0 5px; }
select, input, button { width: 100%; margin-bottom: 6px; }
</style>
</head>

<body>

<div id="sidebar">

  <h3>GIS Web Template v3</h3>

  <!-- PROJECTS -->
  <select id="projectSelect"></select>

  <hr>

  <!-- FILTERS -->
  <h4>🔎 Filters</h4>
  <div id="filters"></div>

  <hr>

  <!-- LEGEND -->
  <h4>🎨 Legend</h4>
  <div id="legend"></div>

  <hr>

  <!-- INSPECTOR -->
  <h4>📍 Inspector</h4>
  <div id="inspector"><em>Click a feature</em></div>

  <hr>

  <!-- LAYERS -->
  <h4>Layers</h4>
  <div id="layers"></div>

  <hr>

  <!-- ADD LAYER -->
  <h4>➕ Add Layer</h4>

  <input id="lname" placeholder="Layer name">
  <input id="lurl" placeholder="Data URL">
  <input id="lfield" placeholder="Category field (optional)">
  <button id="addLayer">Add Layer</button>

  <hr>

  <button id="export">Export Project</button>

</div>

<div id="map"></div>

<script>

// =====================
// MAP
// =====================

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [-73.92, 41.29],
  zoom: 12
});

// =====================
// STATE
// =====================

let ACTIVE_KEY = "default";
let RUNTIME = structuredClone(PROJECTS[ACTIVE_KEY]);
let DATA = {};
let FILTER_STATE = {};

// =====================
// STYLE ENGINE
// =====================

function getColor(layer) {

  if (!layer.style || layer.style.type !== "categorical") {
    return "#3b82f6";
  }

  return [
    "match",
    ["get", layer.style.field],
    ...layer.style.stops.flatMap(s => [s.value, s.color]),
    layer.style.default || "#999"
  ];
}

// =====================
// LOADERS
// =====================

function loadLayer(layer) {
  if (layer.type === "sheet") loadSheet(layer);
  if (layer.type === "rest") loadRest(layer);
}

// ---------------------

function loadSheet(layer) {

  Papa.parse(layer.url, {
    download: true,
    header: true,

    complete: (res) => {

      const geojson = {
        type: "FeatureCollection",
        features: res.data
          .filter(d => d[layer.latField] && d[layer.lngField])
          .map(d => ({
            type: "Feature",
            geometry: {
              type: "Point",
              coordinates: [
                parseFloat(d[layer.lngField]),
                parseFloat(d[layer.latField])
              ]
            },
            properties: d
          }))
      };

      DATA[layer.id] = geojson;

      map.addSource(layer.id, { type: "geojson", data: geojson });

      map.addLayer({
        id: layer.id,
        type: "circle",
        source: layer.id,
        paint: {
          "circle-radius": layer.style?.radius || 6,
          "circle-stroke-width": 1,
          "circle-stroke-color": "#fff",
          "circle-color": getColor(layer)
        }
      });

      renderAll();
    }
  });
}

// ---------------------

function loadRest(layer) {

  fetch(layer.url)
    .then(r => r.json())
    .then(data => {

      DATA[layer.id] = data;

      map.addSource(layer.id, {
        type: "geojson",
        data
      });

      if (layer.geometry === "polygon") {

        map.addLayer({
          id: layer.id,
          type: "fill",
          source: layer.id,
          paint: {
            "fill-color": layer.style?.fill || "#10b981",
            "fill-opacity": layer.style?.opacity || 0.3
          }
        });

      } else {

        map.addLayer({
          id: layer.id,
          type: "circle",
          source: layer.id,
          paint: {
            "circle-radius": 6,
            "circle-color": "#3b82f6",
            "circle-stroke-width": 1,
            "circle-stroke-color": "#fff"
          }
        });
      }

      renderAll();
    });
}

// =====================
// UI ORCHESTRATION
// =====================

function renderAll() {
  renderLayers();
  buildFilters();
  buildLegend();
}

// =====================
// LAYERS UI
// =====================

function renderLayers() {

  const el = document.getElementById("layers");
  el.innerHTML = "";

  RUNTIME.layers.forEach(layer => {

    const div = document.createElement("div");
    div.className = "block";

    div.innerHTML = `
      <label>
        <input type="checkbox" id="t-${layer.id}" checked>
        ${layer.name}
      </label>
      <button id="z-${layer.id}">Zoom</button>
    `;

    el.appendChild(div);

    document.getElementById(`t-${layer.id}`).onchange = (e) => {
      map.setLayoutProperty(
        layer.id,
        "visibility",
        e.target.checked ? "visible" : "none"
      );
    };

    document.getElementById(`z-${layer.id}`).onclick = () => {

      const data = DATA[layer.id];
      if (!data?.features?.length) return;

      const coords = data.features.map(f => f.geometry.coordinates);

      const bounds = coords.reduce((b, c) =>
        b.extend(c),
        new maplibregl.LngLatBounds(coords[0], coords[0])
      );

      map.fitBounds(bounds, { padding: 40 });
    };
  });
}

// =====================
// FILTERS
// =====================

function buildFilters() {

  const el = document.getElementById("filters");
  el.innerHTML = "";

  RUNTIME.layers.forEach(layer => {

    if (!layer.style?.field) return;

    const values = new Set();

    DATA[layer.id]?.features?.forEach(f => {
      const v = f.properties?.[layer.style.field];
      if (v) values.add(v);
    });

    const wrap = document.createElement("div");
    wrap.className = "block";

    const select = document.createElement("select");

    select.innerHTML = `
      <option value="ALL">${layer.name} (All)</option>
      ${[...values].map(v => `<option value="${v}">${v}</option>`).join("")}
    `;

    select.onchange = () => {
      FILTER_STATE[layer.id] = select.value;
      applyFilters();
    };

    wrap.innerHTML = `<strong>${layer.name}</strong>`;
    wrap.appendChild(select);

    el.appendChild(wrap);
  });
}

function applyFilters() {

  RUNTIME.layers.forEach(layer => {

    const source = map.getSource(layer.id);
    const data = DATA[layer.id];

    if (!source || !data) return;

    const v = FILTER_STATE[layer.id];
    const field = layer.style?.field;

    if (!v || v === "ALL") {
      source.setData(data);
      return;
    }

    source.setData({
      ...data,
      features: data.features.filter(f =>
        f.properties?.[field] === v
      )
    });
  });
}

// =====================
// LEGEND
// =====================

function buildLegend() {

  const el = document.getElementById("legend");
  el.innerHTML = "";

  RUNTIME.layers.forEach(layer => {

    const style = layer.style;
    if (!style) return;

    const block = document.createElement("div");
    block.className = "block";

    block.innerHTML = `<strong>${layer.name}</strong><br>`;

    if (style.type === "categorical") {

      style.stops.forEach(s => {

        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.gap = "6px";

        row.innerHTML = `
          <div style="width:10px;height:10px;background:${s.color}"></div>
          <div>${s.value}</div>
        `;

        block.appendChild(row);
      });
    }

    else if (style.fill) {

      block.innerHTML += `
        <div style="display:flex;gap:6px;">
          <div style="width:10px;height:10px;background:${style.fill}"></div>
          <div>Layer</div>
        </div>
      `;
    }

    el.appendChild(block);
  });
}

// =====================
// INSPECTOR
// =====================

map.on("click", (e) => {

  const f = map.queryRenderedFeatures(e.point)[0];
  if (!f) return;

  const el = document.getElementById("inspector");

  let html = `<strong>${f.layer.id}</strong><br><br>`;

  Object.entries(f.properties || {}).forEach(([k,v]) => {
    html += `<div><strong>${k}:</strong> ${v}</div>`;
  });

  el.innerHTML = html;
});

// =====================
// PROJECTS
// =====================

function getProject() {
  return new URLSearchParams(window.location.search)
    .get("project") || "default";
}

function loadProject() {

  ACTIVE_KEY = getProject();
  RUNTIME = structuredClone(PROJECTS[ACTIVE_KEY]);

  RUNTIME.layers.forEach(loadLayer);
}

// =====================
// BUILDER
// =====================

document.getElementById("addLayer").onclick = () => {

  const layer = {
    id: "layer_" + Date.now(),
    name: document.getElementById("lname").value,
    type: "sheet",
    url: document.getElementById("lurl").value,
    latField: "Latitude",
    lngField: "Longitude",
    style: {
      type: "categorical",
      field: document.getElementById("lfield").value || "Category",
      stops: [{ value: "default", color: "#3b82f6" }],
      default: "#999",
      radius: 6
    }
  };

  RUNTIME.layers.push(layer);
  loadLayer(layer);
  renderAll();
};

// =====================
// EXPORT
// =====================

document.getElementById("export").onclick = () => {

  const blob = new Blob(
    [JSON.stringify(RUNTIME, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = ACTIVE_KEY + "-project.json";
  a.click();
};

// =====================
// INIT
// =====================

map.on("load", () => {
  loadProject();
});

</script>

</body>
</html>
