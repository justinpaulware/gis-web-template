<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GIS Web Template</title>

<link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="config.js"></script>

<style>
body { margin: 0; font-family: sans-serif; }

#sidebar {
  position: absolute;
  left: 0;
  top: 0;
  width: 280px;
  height: 100vh;
  background: white;
  border-right: 1px solid #ddd;
  padding: 12px;
  overflow-y: auto;
}

#map {
  position: absolute;
  left: 280px;
  right: 0;
  top: 0;
  bottom: 0;
}

.section-title {
  font-weight: bold;
  margin-top: 10px;
}

.layer-block {
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}

.small {
  font-size: 12px;
}
</style>
</head>

<body>

<div id="sidebar">

  <h3>GIS Template</h3>

  <!-- FILTERS -->
  <div id="filters"></div>

  <hr>

  <!-- LAYERS -->
  <div id="layer-controls"></div>

  <hr>

  <!-- LEGEND -->
  <div id="legend"></div>

  <hr>

  <!-- NO-CODE BUILDER -->
  <h4>➕ Add Layer</h4>

  <input id="lb-name" placeholder="Layer name"><br><br>

  <select id="lb-type">
    <option value="sheet">Google Sheet</option>
    <option value="rest">REST GeoJSON</option>
  </select><br><br>

  <input id="lb-url" placeholder="Data URL"><br><br>
  <input id="lb-group" placeholder="Group"><br><br>
  <input id="lb-field" placeholder="Category field"><br><br>

  <button id="add-layer">Add Layer</button>

  <hr>

  <button id="export-config">Export config.js</button>

</div>

<div id="map"></div>

<script>

// =====================
// STATE
// =====================

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [-73.92, 41.29],
  zoom: 12
});

let RUNTIME = structuredClone(CONFIG);
const DATA = {};

// =====================
// LOADERS
// =====================

function loadSheet(layer) {

  Papa.parse(layer.url, {
    download: true,
    header: true,

    complete: (res) => {

      const geojson = {
        type: "FeatureCollection",
        features: res.data
          .filter(d => d.Latitude && d.Longitude)
          .map(d => ({
            type: "Feature",
            geometry: {
              type: "Point",
              coordinates: [parseFloat(d.Longitude), parseFloat(d.Latitude)]
            },
            properties: d
          }))
      };

      DATA[layer.id] = geojson;

      map.addSource(layer.id, { type: "geojson", data: geojson });

      map.addLayer({
        id: layer.id,
        type: "circle",
        source: layer.id,

        paint: {
          "circle-radius": layer.paint["circle-radius"],
          "circle-stroke-width": layer.paint["circle-stroke-width"],
          "circle-stroke-color": layer.paint["circle-stroke-color"],

          "circle-color": [
            "match",
            ["get", layer.colorField],
            ...Object.entries(layer.colorMap).flat(),
            "#999"
          ]
        }
      });

      renderUI();

    }
  });
}

function loadRest(layer) {

  fetch(layer.url)
    .then(r => r.json())
    .then(data => {

      DATA[layer.id] = data;

      map.addSource(layer.id, { type: "geojson", data });

      map.addLayer({
        id: layer.id,
        type: "fill",
        source: layer.id,
        paint: {
          "fill-color": "#10b981",
          "fill-opacity": 0.3
        }
      });

      renderUI();

    });

}

// =====================
// FILTERS
// =====================

function renderFilters() {

  const el = document.getElementById("filters");
  el.innerHTML = "";

  const f = CONFIG.filters?.[0];
  if (!f) return;

  const select = document.createElement("select");

  f.options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.text = o;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => {

    const value = select.value;

    RUNTIME.layers.forEach(layer => {

      const source = map.getSource(layer.id);
      const data = DATA[layer.id];

      if (!source || !data) return;

      if (value === "All") {
        source.setData(data);
      } else {
        source.setData({
          ...data,
          features: data.features.filter(f =>
            f.properties[layer.colorField] === value
          )
        });
      }
    });

  });

  el.innerHTML = "<div class='section-title'>Filters</div>";
  el.appendChild(select);
}

// =====================
// LEGEND
// =====================

function renderLegend() {

  const el = document.getElementById("legend");
  el.innerHTML = "<div class='section-title'>Legend</div>";

  RUNTIME.layers.forEach(layer => {

    if (!layer.colorMap) return;

    const block = document.createElement("div");
    block.innerHTML = `<strong>${layer.name}</strong><br>`;

    Object.entries(layer.colorMap).forEach(([k, v]) => {
      block.innerHTML += `
        <div style="display:flex;gap:6px;align-items:center;">
          <div style="width:10px;height:10px;background:${v}"></div>
          <div class="small">${k}</div>
        </div>
      `;
    });

    el.appendChild(block);
  });
}

// =====================
// SIDEBAR (LAYERS)
// =====================

function renderUI() {

  const el = document.getElementById("layer-controls");
  el.innerHTML = "<div class='section-title'>Layers</div>";

  const groups = {};

  RUNTIME.layers.forEach(l => {
    if (!groups[l.group]) groups[l.group] = [];
    groups[l.group].push(l);
  });

  Object.keys(groups).forEach(g => {

    el.innerHTML += `<div class="section-title">${g}</div>`;

    groups[g].forEach(layer => {

      const div = document.createElement("div");
      div.className = "layer-block";

      div.innerHTML = `
        <label>
          <input type="checkbox" id="t-${layer.id}" checked>
          ${layer.name}
        </label><br>

        <input type="range" min="0" max="1" step="0.1"
               value="1" id="o-${layer.id}">

        <button id="z-${layer.id}">Zoom</button>
      `;

      el.appendChild(div);

      document.getElementById(`t-${layer.id}`).onclick = (e) => {
        map.setLayoutProperty(
          layer.id,
          "visibility",
          e.target.checked ? "visible" : "none"
        );
      };

      document.getElementById(`o-${layer.id}`).oninput = (e) => {

        const v = parseFloat(e.target.value);

        if (layer.style === "circle") {
          map.setPaintProperty(layer.id, "circle-opacity", v);
        }

        if (layer.style === "fill") {
          map.setPaintProperty(layer.id, "fill-opacity", v);
        }
      };

      document.getElementById(`z-${layer.id}`).onclick = () => {

        const data = DATA[layer.id];
        if (!data) return;

        const coords = data.features
          .filter(f => f.geometry.type === "Point")
          .map(f => f.geometry.coordinates);

        if (!coords.length) return;

        const bounds = coords.reduce((b, c) =>
          b.extend(c),
          new maplibregl.LngLatBounds(coords[0], coords[0])
        );

        map.fitBounds(bounds, { padding: 40 });
      };

    });
  });

  renderLegend();
}

// =====================
// NO-CODE BUILDER
// =====================

document.getElementById("add-layer").onclick = () => {

  const layer = {
    id: "layer_" + Date.now(),
    name: document.getElementById("lb-name").value,
    type: document.getElementById("lb-type").value,
    url: document.getElementById("lb-url").value,
    group: document.getElementById("lb-group").value || "Ungrouped",
    colorField: document.getElementById("lb-field").value || null,
    style: "circle",
    paint: {
      "circle-radius": 6,
      "circle-stroke-width": 1,
      "circle-stroke-color": "#fff"
    },
    colorMap: { default: "#3b82f6" }
  };

  RUNTIME.layers.push(layer);
  loadLayer(layer);
});

// export config
document.getElementById("export-config").onclick = () => {

  const blob = new Blob(
    ["const CONFIG = " + JSON.stringify(RUNTIME, null, 2)],
    { type: "text/javascript" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "config.js";
  a.click();
};

// =====================
// ENGINE
// =====================

function loadLayer(layer) {
  if (layer.type === "sheet") loadSheet(layer);
  if (layer.type === "rest") loadRest(layer);
}

map.on("load", () => {
  RUNTIME.layers.forEach(loadLayer);
});

</script>

</body>
</html>
